    .table-container { overflow-x:auto; overflow-y:auto; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)} }

const load = () => {
  try {

    const d = localStorage.getItem('retail_items');
    // If version mismatch (e.g. upc field added) OR first load → use SEED_DATA
    if (!d || v !== DATA_VERSION) return SEED_DATA;
    const parsed = JSON.parse(d);
    // Extra guard: if first item missing upc field, reload from seed
    if (parsed.length && parsed[0].upc === undefined) return SEED_DATA;
    return parsed;
  } catch { return SEED_DATA; }
};

// ─── Spreadsheet Parser ───────────────────────────────────────────────────────
const SKIP_COLS = new Set(['OMS SKU','UPC','OMS Description','Product Title','Short Description','ENC']);
const RETAILER_COL_MAP = {
  'Walmart':'Walmart','Overstock':'Overstock','Homedepot':'Home Depot',
  'Channeladvisor':'ChannelAdvisor','NRHL':'NRHL','AAFES':'AAFES',
  'Bestbuy':'Best Buy','Lowes':"Lowe's"
};
const BRAND_SHEET_MAP = {
  'elite cuisine setup':'Elite Cuisine','phomemo setup':'PHOMEMO',
  'elite gourmet setup':'Elite Gourmet','mili setup':'MILI',
  'elite cuisine x':'Elite Cuisine','lumicharge setup':'Lumicharge',
  'sonagi setup':'Sonagi','inoviva setup':'Inoviva',
  'hizero setup':'HIZERO','bestisan':'Bestisan'
};
const CATEGORY_BRAND_MAP = {
  'Elite Cuisine':'Home & Garden','Elite Gourmet':'Home & Garden',
  'Inoviva':'Home & Garden','HIZERO':'Home & Garden',
  'PHOMEMO':'Electronics','MILI':'Electronics','Lumicharge':'Electronics',
  'Sonagi':'Electronics','Bestisan':'Electronics'
};

function parseSpreadsheet(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const newItems = [];
        const nowStr = new Date().toISOString();

        wb.SheetNames.forEach(sheetName => {
          const brandKey = sheetName.trim().toLowerCase();
          const brand = BRAND_SHEET_MAP[brandKey] || sheetName.trim();
          const ws = wb.Sheets[sheetName];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          if (!rows.length) return;

          const allCols = Object.keys(rows[0]);
          const retailerCols = allCols.filter(c => !SKIP_COLS.has(c));

          rows.forEach(row => {
            const sku = String(row['OMS SKU'] || '').trim();
            if (!sku || sku === 'undefined') return;
            const name = String(row['Product Title'] || row['OMS Description'] || sku).trim();
            const cleanName = name.length > 90 ? name.slice(0,87)+'...' : name;

            retailerCols.forEach(col => {
              const val = String(row[col] || '').trim().toLowerCase();
              if (!val || val === 'undefined') return;
              const status = val === 'done' ? 'live' : 'pending';
              const retailer = RETAILER_COL_MAP[col] || col;
              newItems.push({
                sku, itemName: cleanName, retailer, status,
                notes: `Brand: ${brand}`,
                category: CATEGORY_BRAND_MAP[brand] || 'Other',
                priority: 'Medium', assignee: '', dueDate: '',
                websiteUrl: '', retailPrice: '',
                lastUpdated: nowStr, createdAt: nowStr,
                _key: `${sku}::${retailer}`
              });
            });
          });
        });
        resolve(newItems);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

  const inputRef = useRef();

  const handleFile = async (file) => {
    if (!file || !file.name.match(/\.xlsx?$/i)) {
      alert('Please upload an .xlsx file'); return;
    }
    setState('parsing');
    try {
      const newItems = await parseSpreadsheet(file);
      // Diff against existing
      const existingMap = {};
      existingItems.forEach(i => { existingMap[`${i.sku}::${i.retailer}`] = i; });

      const added = [], updated = [], unchanged = [];
      newItems.forEach(item => {
        const existing = existingMap[item._key];
        if (!existing) {
          added.push(item);
        } else if (existing.status !== item.status) {
          updated.push({ ...existing, status: item.status, itemName: item.itemName, lastUpdated: item.lastUpdated });
        } else {
          unchanged.push(item);
        }
      });
      setParsed({ added, updated, unchanged, total: newItems.length, file: file.name });
      setState('preview');
    } catch(err) {
      setState('idle');
      alert('Error reading file: ' + err.message);
    }
  };

  const handleConfirm = () => {
    setState('importing');
    // Merge: update existing + add new (preserve websiteUrl, retailPrice etc.)
    const existingMap = {};
    existingItems.forEach(i => { existingMap[`${i.sku}::${i.retailer}`] = i; });

    // Apply updates
    parsed.updated.forEach(u => { existingMap[`${u.sku}::${u.retailer}`] = u; });
    // Add new
    parsed.added.forEach(a => {
      const { _key, ...item } = a;
      existingMap[_key] = { ...item, id: uid() };
    });

    onImport(Object.values(existingMap));
    onClose();
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg mx-4 fade-in overflow-hidden">
        {/* Header */}
        <div className="flex items-center justify-between px-6 py-4 border-b bg-slate-50">
          <div>
            <h2 className="text-base font-bold text-slate-800">Upload Spreadsheet</h2>
            <p className="text-xs text-slate-500 mt-0.5">Upload your OCI Pending Task List to sync latest data</p>
          </div>
          <button onClick={onClose} className="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
        </div>

        {state === 'idle' && (
          <div className="p-6">
            {/* Drop zone */}
            <div
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);handleFile(e.dataTransfer.files[0]);}}
              onClick={()=>inputRef.current.click()}
              className={`border-2 border-dashed rounded-xl p-10 text-center cursor-pointer transition-all ${
                dragOver ? 'border-blue-400 bg-blue-50' : 'border-slate-200 hover:border-blue-300 hover:bg-slate-50'
              }`}
            >
              <div className="text-4xl mb-3">📊</div>
              <p className="font-semibold text-slate-700 mb-1">Drop your Excel file here</p>
              <p className="text-xs text-slate-400">or click to browse — .xlsx files only</p>
              <p className="text-xs text-slate-400 mt-1 italic">e.g. "Pending Task List By SKU -OCI.xlsx"</p>
              <input ref={inputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={e=>handleFile(e.target.files[0])} />
            </div>
            {/* What happens info */}
            <div className="mt-4 bg-blue-50 border border-blue-200 rounded-xl p-4 text-xs text-blue-700 space-y-1.5">
              <p className="font-bold text-blue-800 mb-2">What this does:</p>
              <p>✅ <strong>New SKUs</strong> — added to the dashboard automatically</p>
              <p>🔄 <strong>Status changes</strong> — e.g. Pending → Live updated instantly</p>
              <p>🔒 <strong>Your data preserved</strong> — URLs, prices & notes you've added are kept</p>
            </div>
          </div>
        )}

        {state === 'parsing' && (
          <div className="p-10 text-center">
            <div className="text-4xl mb-4 animate-spin">⏳</div>
            <p className="font-semibold text-slate-700">Reading spreadsheet...</p>
            <p className="text-xs text-slate-400 mt-1">Parsing all brand sheets</p>
          </div>
        )}

        {state === 'preview' && parsed && (
          <div className="p-6">
            <div className="flex items-center gap-2 mb-4">
              <span className="text-green-600 text-lg">✅</span>
              <div>
                <p className="font-semibold text-slate-800 text-sm">{parsed.file}</p>
                <p className="text-xs text-slate-500">{parsed.total} total SKU × retailer rows found</p>
              </div>
            </div>
            {/* Diff summary */}
            <div className="grid grid-cols-3 gap-3 mb-5">
              <div className="bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold text-green-700">{parsed.added.length}</div>
                <div className="text-xs text-green-600 font-medium mt-0.5">New Items</div>
              </div>
              <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-center">
                <div className="text-2xl font-bold text-amber-700">{parsed.updated.length}</div>
                <div className="text-xs text-amber-600 font-medium mt-0.5">Status Updates</div>
              </div>
              <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 text-center">

                <div className="text-xs text-slate-500 font-medium mt-0.5">Unchanged</div>
              </div>
            </div>
            {/* Updated items preview */}
            {parsed.updated.length > 0 && (
              <div className="mb-4">
                <p className="text-xs font-bold text-slate-600 uppercase mb-2">Status Changes Preview</p>
                <div className="max-h-36 overflow-y-auto border border-slate-200 rounded-lg divide-y divide-slate-100 text-xs">
                  {parsed.updated.slice(0,20).map((u,i) => (
                    <div key={i} className="flex items-center gap-2 px-3 py-1.5">
                      <span className="font-mono text-slate-500 shrink-0">{u.sku}</span>

            <div className="flex gap-2">
              <button onClick={onClose} className="flex-1 border border-slate-200 text-slate-600 text-sm font-medium rounded-lg py-2 hover:bg-slate-50">Cancel</button>

// ─── Matrix View ──────────────────────────────────────────────────────────────
const MATRIX_RETAILERS = ['Walmart','Overstock','Home Depot','ChannelAdvisor','NRHL','AAFES',"Lowe's",'Best Buy'];

function MatrixView({ items, onDrillDown }) {
  const matrix = useMemo(() => {
    const m = {};
    items.forEach(item => {
      const brand = getBrand(item);
      const retailer = item.retailer;
      if (!brand || !retailer) return;
      if (!m[brand]) m[brand] = {};
      if (!m[brand][retailer]) m[brand][retailer] = { live:0, pending:0, inProgress:0, skus:new Set() };
      m[brand][retailer].skus.add(item.sku);
      if (item.status === 'live') m[brand][retailer].live++;
      else if (item.status === 'pending') m[brand][retailer].pending++;
      else if (item.status === 'in-progress') m[brand][retailer].inProgress++;
    });
    return m;
  }, [items]);

  const brandTotals = useMemo(() => {
    const t = {};
    BRANDS.forEach(b => {
      const skus = new Set(); let live = 0, pending = 0;
      items.filter(i => getBrand(i) === b).forEach(i => { skus.add(i.sku); if(i.status==='live') live++; else if(i.status==='pending') pending++; });
      t[b] = { skus: skus.size, live, pending };
    });
    return t;
  }, [items]);

  return (
    <div className="flex-1 overflow-auto p-4">
      <div className="bg-white rounded-xl border border-slate-200 overflow-auto shadow-sm">
        <table className="w-full border-collapse text-xs" style={{minWidth:'900px'}}>
          <thead>
            <tr className="bg-slate-800 text-white">
              <th className="text-left px-4 py-3 font-semibold sticky left-0 bg-slate-800 z-10 w-40">BRAND</th>
              <th className="text-center px-3 py-3 font-semibold text-slate-300 w-24">SKUs</th>
              {MATRIX_RETAILERS.map(r => (
                <th key={r} className="text-center px-3 py-3 font-semibold whitespace-nowrap">{r}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {BRANDS.map((brand, bi) => {
              const totals = brandTotals[brand] || {};
              return (
                <tr key={brand} className={bi % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                  {/* Brand name */}
                  <td className={`sticky left-0 z-10 px-4 py-3 font-semibold text-slate-800 border-r border-slate-100 ${bi%2===0?'bg-white':'bg-slate-50'}`}>
                    <div className="font-bold text-slate-800">{brand}</div>
                    <div className="text-slate-400 font-normal mt-0.5">{totals.skus || 0} unique SKUs</div>
                  </td>
                  {/* Totals col */}
                  <td className="text-center px-3 py-3 border-r border-slate-100">
                    <div className="inline-flex flex-col items-center gap-0.5">
                      {totals.live > 0 && <span className="text-green-700 font-bold">{totals.live} live</span>}
                      {totals.pending > 0 && <span className="text-amber-600 font-bold">{totals.pending} pend</span>}
                    </div>
                  </td>
                  {/* Retailer cells */}
                  {MATRIX_RETAILERS.map(retailer => {
                    const cell = matrix[brand]?.[retailer];
                    if (!cell) return (
                      <td key={retailer} className="text-center px-3 py-3 border-r border-slate-100 last:border-r-0">
                        <span className="text-slate-200 text-base">—</span>
                      </td>
                    );
                    const allLive = cell.pending === 0 && cell.inProgress === 0;
                    const hasPending = cell.pending > 0;
                    const skuCount = cell.skus.size;
                    return (
                      <td key={retailer} className="text-center px-2 py-2 border-r border-slate-100 last:border-r-0">
                        <button
                          onClick={() => onDrillDown(brand, retailer)}
                          className={`w-full rounded-lg px-2 py-2 transition-all hover:scale-105 hover:shadow-md ${
                            allLive
                              ? 'bg-green-50 border border-green-200 hover:bg-green-100'
                              : hasPending
                              ? 'bg-amber-50 border border-amber-200 hover:bg-amber-100'
                              : 'bg-blue-50 border border-blue-200 hover:bg-blue-100'
                          }`}
                        >
                          <div className="font-bold text-slate-700">{skuCount} <span className="font-normal text-slate-500">SKU{skuCount!==1?'s':''}</span></div>
                          <div className="mt-0.5 space-y-0.5">
                            {cell.live > 0 && <div className="text-green-700 font-semibold">{cell.live} Live</div>}
                            {cell.pending > 0 && <div className="text-amber-600 font-semibold">{cell.pending} Pending</div>}
                            {cell.inProgress > 0 && <div className="text-blue-600 font-semibold">{cell.inProgress} In Prog</div>}
                          </div>
                        </button>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {/* Legend */}
      <div className="flex items-center gap-4 mt-3 px-1 text-xs text-slate-500">
        <span className="font-semibold">Legend:</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-green-100 border border-green-300 inline-block"></span> All Live</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-amber-100 border border-amber-300 inline-block"></span> Has Pending</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-blue-100 border border-blue-300 inline-block"></span> In Progress</span>
        <span className="flex items-center gap-1.5"><span className="text-slate-300">—</span> Not at this retailer</span>
        <span className="ml-2 italic">Click any cell to drill into those items</span>
      </div>
    </div>
  );
}

// ─── Inline Cell Editor ───────────────────────────────────────────────────────
function InlineEdit({ value, placeholder, onSave, display, isLive }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value || '');
  const inputRef = useRef();

  const startEdit = (e) => { e.stopPropagation(); setDraft(value || ''); setEditing(true); setTimeout(()=>inputRef.current?.focus(),30); };
  const commit = (e) => { e.stopPropagation(); setEditing(false); if (draft !== value) onSave(draft); };
  const handleKey = (e) => { e.stopPropagation(); if (e.key==='Enter') commit(e); if (e.key==='Escape') { e.stopPropagation(); setEditing(false); } };

  if (editing) return (
    <div onClick={e=>e.stopPropagation()} className="flex items-center">
      <input
        ref={inputRef}
        value={draft}
        onChange={e=>setDraft(e.target.value)}
        onBlur={commit}
        onKeyDown={handleKey}
        placeholder={placeholder}
        className="text-xs border border-blue-400 rounded px-2 py-0.5 w-32 focus:outline-none focus:ring-1 focus:ring-blue-400"
      />
    </div>
  );

  if (value) return display;

  // Empty — show prompt based on status
  if (isLive) return (
    <button
      onClick={startEdit}
      className="text-xs text-amber-500 hover:text-amber-700 border border-amber-200 hover:border-amber-400 bg-amber-50 hover:bg-amber-100 px-1.5 py-0.5 rounded transition-colors whitespace-nowrap"
    >+ Add</button>
  );
  return <span className="text-slate-200 text-xs">—</span>;
}

// ─── Retailer Search URL Generator ────────────────────────────────────────────
const RETAILER_SEARCH_URLS = {
  'Walmart':         (sku, name) => `https://www.walmart.com/search?q=${encodeURIComponent(sku)}`,
  'Home Depot':      (sku, name) => `https://www.homedepot.com/s/${encodeURIComponent(sku)}`,
  'Best Buy':        (sku, name) => `https://www.bestbuy.com/site/searchpage.jsp?st=${encodeURIComponent(sku)}`,
  "Lowe's":          (sku, name) => `https://www.lowes.com/search?searchTerm=${encodeURIComponent(sku)}`,
  'Overstock':       (sku, name) => `https://www.overstock.com/search?keywords=${encodeURIComponent(sku)}`,
  'AAFES':           (sku, name) => `https://www.shopmyexchange.com/search?query=${encodeURIComponent(sku)}`,
  'NRHL':            (sku, name) => `https://www.nrhlonline.com/search?q=${encodeURIComponent(sku)}`,
  'ChannelAdvisor':  (sku, name) => `https://manage.channeladvisor.com/`,
  'Amazon':          (sku, name) => `https://www.amazon.com/s?k=${encodeURIComponent(sku)}`,
  'Target':          (sku, name) => `https://www.target.com/s?searchTerm=${encodeURIComponent(sku)}`,
};
const getRetailerSearchUrl = (item) => {
  const fn = RETAILER_SEARCH_URLS[item.retailer];
  return fn ? fn(item.sku, item.itemName) : null;
};

// ─── Task Row (separate component for perf) ───────────────────────────────────
const PRIORITY_STYLE = {
  Critical: 'text-red-700 bg-red-50 border-red-200',
  High:     'text-orange-700 bg-orange-50 border-orange-200',
  Medium:   'text-amber-700 bg-amber-50 border-amber-200',
  Low:      'text-slate-500 bg-slate-50 border-slate-200',
};

function TaskRow({ item, skuProgressMap, onEdit, onStatusChange, onSkuClick, onFieldUpdate }) {
  const s = statusObj(item.status);
  const brand = getBrand(item);
  const isLive = item.status === 'live';
  const prog = skuProgressMap?.[item.sku] || {live:0,total:1};
  const progPct = prog.total > 0 ? Math.round(prog.live/prog.total*100) : 0;

  return (
    <tr
      className="task-row cursor-pointer fade-in"
      onClick={() => onEdit(item)}
    >
      {/* Status */}
      <td className="px-2 py-2">
        <StatusPill value={item.status} onChange={v=>onStatusChange(item.id,v)} />
      </td>
      {/* SKU */}
      <td className="px-3 py-2">
        <button
          onClick={e=>{e.stopPropagation(); onSkuClick(item.sku);}}
          className="font-mono text-xs bg-blue-50 text-blue-700 border border-blue-200 px-1.5 py-0.5 rounded hover:bg-blue-100 hover:border-blue-400 transition-colors cursor-pointer"
          title="Click to see all retailers for this SKU"
        >{item.sku || '—'}</button>
      </td>
      {/* Product Name */}
      <td className="px-3 py-2 max-w-0">
        <div className="truncate text-slate-800 text-sm font-medium" title={item.itemName}>{item.itemName}</div>
      </td>
      {/* UPC */}
      <td className="px-3 py-2">
        <span className="font-mono text-xs text-slate-400">{item.upc || '—'}</span>
      </td>
      {/* Brand */}
      <td className="px-3 py-2">
        <span className="text-xs text-slate-600 font-medium">{brand || '—'}</span>
      </td>
      {/* Retailer */}
      <td className="px-3 py-2">
        <span className="text-xs text-slate-600 bg-slate-100 px-2 py-0.5 rounded-full">{item.retailer || '—'}</span>
      </td>
      {/* Priority */}
      <td className="px-2 py-2">
        {item.priority
          ? <span className={`text-xs font-semibold px-1.5 py-0.5 rounded-full border ${PRIORITY_STYLE[item.priority]||'text-slate-400 bg-slate-50 border-slate-200'}`}>{item.priority}</span>
          : <span className="text-slate-200 text-xs">—</span>
        }
      </td>
      {/* Progress (SKU-level: X/Y retailers live) */}
      <td className="px-3 py-2 text-center" onClick={e=>e.stopPropagation()}>
        <button onClick={e=>{e.stopPropagation();onSkuClick(item.sku);}} title={`${prog.live}/${prog.total} retailers live — click to view all`}
          className={`text-xs font-mono font-bold px-1.5 py-0.5 rounded border ${progPct===100?'text-green-700 bg-green-50 border-green-200':progPct>0?'text-amber-700 bg-amber-50 border-amber-200':'text-slate-400 bg-slate-50 border-slate-200'}`}>
          {prog.live}/{prog.total}
        </button>
      </td>
      {/* URL — inline editable; shows search link when empty */}
      <td className="px-3 py-2 text-center" onClick={e=>e.stopPropagation()}>
        {item.websiteUrl ? (
          <a href={item.websiteUrl} target="_blank" rel="noreferrer"
             onClick={e=>e.stopPropagation()}
             className="inline-flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 border border-blue-200 bg-blue-50 hover:bg-blue-100 px-2 py-0.5 rounded-full transition-colors"
             title={item.websiteUrl}>
            🔗 Live
          </a>
        ) : (() => {
          const searchUrl = getRetailerSearchUrl(item);
          return searchUrl ? (
            <a href={searchUrl} target="_blank" rel="noreferrer"
               onClick={e=>e.stopPropagation()}
               className="inline-flex items-center gap-1 text-xs text-slate-400 hover:text-blue-600 border border-dashed border-slate-300 hover:border-blue-400 bg-white hover:bg-blue-50 px-2 py-0.5 rounded-full transition-colors"
               title={`Search ${item.retailer} for ${item.sku}`}>
              🔍 Find
            </a>
          ) : <span className="text-slate-200 text-xs">—</span>;
        })()}
      </td>
      {/* Price — inline editable for live rows */}
      <td className="px-3 py-2 text-center" onClick={e=>e.stopPropagation()}>
        <InlineEdit
          value={item.retailPrice}
          placeholder="$0.00"
          isLive={isLive}
          onSave={v=>onFieldUpdate(item.id,'retailPrice',v)}
          display={
            <span
              onClick={e=>{e.stopPropagation();}}
              className="text-xs font-bold text-green-700 bg-green-50 border border-green-200 px-2 py-0.5 rounded-full cursor-default"
            >{item.retailPrice}</span>
          }
        />
      </td>
      {/* Actions */}
      <td className="px-3 py-2">
        <div className="row-actions flex items-center gap-1 justify-end">
          <button
            onClick={e=>{e.stopPropagation();onEdit(item);}}
            className="text-xs px-2 py-0.5 rounded border border-slate-200 text-slate-500 hover:bg-slate-100"
          >Edit</button>
        </div>
      </td>
    </tr>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
