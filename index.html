// ─── SKU Detail Panel ─────────────────────────────────────────────────────────
function SkuPanel({ sku, items, onClose, onEditItem }) {
  if (!sku) return null;
  const skuItems = items.filter(i => i.sku === sku);
  if (!skuItems.length) return null;
  const sample = skuItems[0];
  const brand = getBrand(sample);
  const liveItems = skuItems.filter(i => i.status === 'live');
  const pendingItems = skuItems.filter(i => i.status === 'pending');
  const liveCount = liveItems.length;
  const totalRetailers = skuItems.length;
  const pct = Math.round((liveCount / totalRetailers) * 100);

  return (
    <div className="fixed inset-0 z-50 flex justify-end">
      <div className="flex-1 bg-black/25" onClick={onClose} />
      <div className="w-[480px] bg-white h-full shadow-2xl flex flex-col slide-panel open">
        {/* Header */}
        <div className="bg-slate-900 text-white px-5 py-4 shrink-0">

            <div>
              <div className="flex items-center gap-2 mb-1">
                <span className="font-mono text-xs bg-white/20 px-2 py-0.5 rounded text-white">{sku}</span>
                {brand && <span className="text-xs text-slate-400">{brand}</span>}
              </div>
              <p className="text-sm font-semibold text-white leading-snug max-w-sm">{sample.itemName}</p>
            </div>
            <button onClick={onClose} className="text-slate-400 hover:text-white text-xl leading-none ml-3 shrink-0">&times;</button>
          </div>
          {/* Progress bar */}
          <div className="mt-4">
            <div className="flex items-center justify-between text-xs mb-1.5">
              <span className="text-slate-300">Retailer Setup Progress</span>
              <span className={`font-bold ${pct===100?'text-green-400':pct>50?'text-amber-400':'text-red-400'}`}>{liveCount}/{totalRetailers} Live ({pct}%)</span>
            </div>
            <div className="w-full bg-slate-700 rounded-full h-2">
              <div
                className={`h-2 rounded-full transition-all ${pct===100?'bg-green-400':pct>50?'bg-amber-400':'bg-red-400'}`}
                style={{width:`${pct}%`}}
              ></div>
            </div>
          </div>
          {/* Summary chips */}
          <div className="flex gap-2 mt-3">
            <span className="text-xs bg-green-500/20 text-green-300 border border-green-500/30 px-2.5 py-1 rounded-full font-medium">{liveCount} Live</span>
            {pendingItems.length > 0 && <span className="text-xs bg-amber-500/20 text-amber-300 border border-amber-500/30 px-2.5 py-1 rounded-full font-medium">{pendingItems.length} Pending</span>}
            {skuItems.filter(i=>i.status==='in-progress').length > 0 && <span className="text-xs bg-blue-500/20 text-blue-300 border border-blue-500/30 px-2.5 py-1 rounded-full font-medium">{skuItems.filter(i=>i.status==='in-progress').length} In Progress</span>}
          </div>
        </div>

        {/* Retailer list */}
        <div className="flex-1 overflow-y-auto">
          <div className="px-5 py-3 border-b bg-slate-50">
            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Setup Status by Retailer</p>
          </div>
          <div className="divide-y divide-slate-100">
            {skuItems
              .sort((a,b) => {
                const order = {live:0,'in-progress':1,pending:2,hold:3};
                return (order[a.status]||9) - (order[b.status]||9);
              })
              .map(item => {
                const s = statusObj(item.status);
                const isLive = item.status === 'live';
                return (
                  <div key={item.id} className={`px-5 py-3.5 flex items-start gap-3 ${isLive ? 'bg-green-50/40' : ''}`}>

                    <div className={`mt-0.5 shrink-0 w-2.5 h-2.5 rounded-full ${s.dot}`}></div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center justify-between gap-2">
                        <span className="font-semibold text-sm text-slate-800">{item.retailer}</span>
                        <span className={`text-xs font-medium px-2 py-0.5 rounded-full border ${s.pill}`}>{s.label}</span>
                      </div>
                      {/* Live details */}
                      {isLive && (
                        <div className="mt-1.5 flex items-center gap-3 flex-wrap">
                          {item.websiteUrl
                            ? <a href={item.websiteUrl} target="_blank" rel="noreferrer"
                                className="flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 font-medium bg-blue-50 border border-blue-200 px-2 py-0.5 rounded-full">
                                🔗 View Live Listing
                              </a>
                            : <span className="text-xs text-slate-400 italic">URL not set yet</span>
                          }
                          {item.retailPrice
                            ? <span className="text-xs font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded-full">{item.retailPrice}</span>
                            : <span className="text-xs text-slate-400 italic">Price not set</span>
                          }
                        </div>
                      )}
                      {/* Pending */}
                      {!isLive && (
                        <p className="text-xs text-slate-400 mt-0.5">
                          {item.status === 'pending' ? 'Awaiting setup' : item.status === 'in-progress' ? 'Setup in progress' : 'On hold'}
                        </p>
                      )}
                    </div>
                    {/* Edit button */}
                    <button
                      onClick={() => onEditItem(item)}
                      className="shrink-0 text-xs px-2 py-1 rounded border border-slate-200 text-slate-400 hover:text-slate-700 hover:bg-slate-50"
                    >Edit</button>
                  </div>
                );
              })}
          </div>
        </div>

        {/* Footer */}
        <div className="px-5 py-3 border-t bg-slate-50 text-xs text-slate-500 shrink-0">
          Click <strong>Edit</strong> on any retailer row to add a live URL or retail price.
        </div>
      </div>
    </div>
  );
}

// ─── Matrix View ──────────────────────────────────────────────────────────────
const MATRIX_RETAILERS = ['Walmart','Overstock','Home Depot','ChannelAdvisor','NRHL','AAFES',"Lowe's",'Best Buy'];

function MatrixView({ items, onDrillDown }) {
  const matrix = useMemo(() => {
    const m = {};
    items.forEach(item => {
      const brand = getBrand(item);
      const retailer = item.retailer;
      if (!brand || !retailer) return;
      if (!m[brand]) m[brand] = {};
      if (!m[brand][retailer]) m[brand][retailer] = { live:0, pending:0, inProgress:0, skus:new Set() };
      m[brand][retailer].skus.add(item.sku);
      if (item.status === 'live') m[brand][retailer].live++;
      else if (item.status === 'pending') m[brand][retailer].pending++;
      else if (item.status === 'in-progress') m[brand][retailer].inProgress++;
    });
    return m;
  }, [items]);

  const brandTotals = useMemo(() => {
    const t = {};
    BRANDS.forEach(b => {
      const skus = new Set(); let live = 0, pending = 0;
      items.filter(i => getBrand(i) === b).forEach(i => { skus.add(i.sku); if(i.status==='live') live++; else if(i.status==='pending') pending++; });
      t[b] = { skus: skus.size, live, pending };
    });
    return t;
  }, [items]);

  return (
    <div className="flex-1 overflow-auto p-4">
      <div className="bg-white rounded-xl border border-slate-200 overflow-auto shadow-sm">
        <table className="w-full border-collapse text-xs" style={{minWidth:'900px'}}>
          <thead>
            <tr className="bg-slate-800 text-white">
              <th className="text-left px-4 py-3 font-semibold sticky left-0 bg-slate-800 z-10 w-40">BRAND</th>
              <th className="text-center px-3 py-3 font-semibold text-slate-300 w-24">SKUs</th>
              {MATRIX_RETAILERS.map(r => (
                <th key={r} className="text-center px-3 py-3 font-semibold whitespace-nowrap">{r}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {BRANDS.map((brand, bi) => {
              const totals = brandTotals[brand] || {};
              return (
                <tr key={brand} className={bi % 2 === 0 ? 'bg-white' : 'bg-slate-50'}>
                  {/* Brand name */}
                  <td className={`sticky left-0 z-10 px-4 py-3 font-semibold text-slate-800 border-r border-slate-100 ${bi%2===0?'bg-white':'bg-slate-50'}`}>
                    <div className="font-bold text-slate-800">{brand}</div>
                    <div className="text-slate-400 font-normal mt-0.5">{totals.skus || 0} unique SKUs</div>
                  </td>
                  {/* Totals col */}
                  <td className="text-center px-3 py-3 border-r border-slate-100">
                    <div className="inline-flex flex-col items-center gap-0.5">
                      {totals.live > 0 && <span className="text-green-700 font-bold">{totals.live} live</span>}
                      {totals.pending > 0 && <span className="text-amber-600 font-bold">{totals.pending} pend</span>}
                    </div>
                  </td>
                  {/* Retailer cells */}
                  {MATRIX_RETAILERS.map(retailer => {
                    const cell = matrix[brand]?.[retailer];
                    if (!cell) return (
                      <td key={retailer} className="text-center px-3 py-3 border-r border-slate-100 last:border-r-0">
                        <span className="text-slate-200 text-base">—</span>
                      </td>
                    );
                    const allLive = cell.pending === 0 && cell.inProgress === 0;
                    const hasPending = cell.pending > 0;
                    const skuCount = cell.skus.size;
                    return (
                      <td key={retailer} className="text-center px-2 py-2 border-r border-slate-100 last:border-r-0">
                        <button
                          onClick={() => onDrillDown(brand, retailer)}
                          className={`w-full rounded-lg px-2 py-2 transition-all hover:scale-105 hover:shadow-md ${
                            allLive
                              ? 'bg-green-50 border border-green-200 hover:bg-green-100'
                              : hasPending
                              ? 'bg-amber-50 border border-amber-200 hover:bg-amber-100'
                              : 'bg-blue-50 border border-blue-200 hover:bg-blue-100'
                          }`}
                        >
                          <div className="font-bold text-slate-700">{skuCount} <span className="font-normal text-slate-500">SKU{skuCount!==1?'s':''}</span></div>
                          <div className="mt-0.5 space-y-0.5">
                            {cell.live > 0 && <div className="text-green-700 font-semibold">{cell.live} Live</div>}
                            {cell.pending > 0 && <div className="text-amber-600 font-semibold">{cell.pending} Pending</div>}
                            {cell.inProgress > 0 && <div className="text-blue-600 font-semibold">{cell.inProgress} In Prog</div>}
                          </div>
                        </button>
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      {/* Legend */}
      <div className="flex items-center gap-4 mt-3 px-1 text-xs text-slate-500">
        <span className="font-semibold">Legend:</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-green-100 border border-green-300 inline-block"></span> All Live</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-amber-100 border border-amber-300 inline-block"></span> Has Pending</span>
        <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-blue-100 border border-blue-300 inline-block"></span> In Progress</span>
        <span className="flex items-center gap-1.5"><span className="text-slate-300">—</span> Not at this retailer</span>
        <span className="ml-2 italic">Click any cell to drill into those items</span>
      </div>
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useState(load);
  const [activeBrand, setActiveBrand] = useState('All');
  const [filterRetailer, setFilterRetailer] = useState('All');
  const [filterStatus, setFilterStatus] = useState('All');
  const [search, setSearch] = useState('');
  const [sortKey, setSortKey] = useState('createdAt');
  const [sortDir, setSortDir] = useState('asc');
  const [page, setPage] = useState(1);
  const [editItem, setEditItem] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [viewMode, setViewMode] = useState('matrix');
  const [selectedSku, setSelectedSku] = useState(null);
  const [skuSearch, setSkuSearch] = useState('');

  useEffect(() => { save(items); }, [items]);

  const updateItem = useCallback((updated) => {
    setItems(prev => prev.map(i => i.id === updated.id ? updated : i));
  }, []);

  const updateStatus = useCallback((id, status) => {
    setItems(prev => prev.map(i => i.id === id ? {...i, status, lastUpdated:now()} : i));
  }, []);

  const addItem = useCallback((item) => setItems(prev => [item, ...prev]), []);
  const deleteItem = useCallback((id) => { setItems(prev => prev.filter(i => i.id !== id)); setEditItem(null); }, []);

  const handleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
    setPage(1);
  };

  const filtered = useMemo(() => {
    let res = items;
    if (activeBrand !== 'All') res = res.filter(i => getBrand(i) === activeBrand);
    if (filterRetailer !== 'All') res = res.filter(i => i.retailer === filterRetailer);
    if (filterStatus !== 'All') res = res.filter(i => i.status === filterStatus);
    if (skuSearch.trim()) res = res.filter(i => i.sku?.toLowerCase() === skuSearch.trim().toLowerCase());
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      res = res.filter(i => i.itemName?.toLowerCase().includes(q) || i.sku?.toLowerCase().includes(q));
    }
    res = [...res].sort((a,b) => {
      const av = String(a[sortKey]||'').toLowerCase(), bv = String(b[sortKey]||'').toLowerCase();
      return sortDir === 'asc' ? (av < bv ? -1 : av > bv ? 1 : 0) : (av > bv ? -1 : av < bv ? 1 : 0);
    });
    return res;
  }, [items, activeBrand, filterRetailer, filterStatus, search, skuSearch, sortKey, sortDir]);

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paginated = filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE);

  // Stats
  const allLive = items.filter(i=>i.status==='live').length;
  const allPending = items.filter(i=>i.status==='pending').length;
  const brandCounts = useMemo(() => {
    const c = {};
    items.forEach(i => { const b = getBrand(i); if(b) c[b] = (c[b]||0)+1; });
    return c;
  }, [items]);

  const SortArrow = ({k}) => sortKey===k ? (sortDir==='asc' ? ' ↑' : ' ↓') : ' ↕';

  const handleDrillDown = useCallback((brand, retailer) => {
    setActiveBrand(brand);
    setFilterRetailer(retailer);
    setFilterStatus('All');
    setSearch('');
    setPage(1);
    setViewMode('table');
  }, []);

  return (
    <div className="h-screen flex flex-col bg-gray-100 overflow-hidden">

      {/* ── Header ── */}
      <header className="bg-slate-900 text-white flex items-center gap-4 px-5 py-3 shrink-0 shadow-lg">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center text-sm">📦</div>
          <div>
            <div className="text-sm font-bold leading-tight">Retail Setup Tracker</div>
            <div className="text-xs text-slate-400 leading-tight">SKU setup status across retailers</div>
          </div>
        </div>
        <div className="flex-1 max-w-sm">
          <input
            value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}}
            placeholder="Search SKU or product name..."
            className="w-full bg-slate-800 text-white text-sm rounded-lg px-3 py-1.5 border border-slate-700 placeholder-slate-500 focus:outline-none focus:border-blue-500"
          />
        </div>
        <div className="ml-auto flex items-center gap-2">
          <button
            onClick={() => {
              const csv = ['SKU,Product Name,Brand,Retailer,Status,URL',
                ...items.map(i=>`"${i.sku}","${i.itemName}","${getBrand(i)}","${i.retailer}","${i.status}","${i.websiteUrl||''}"`)
              ].join('\n');
              const a=document.createElement('a'); a.href='data:text/csv,'+encodeURIComponent(csv); a.download='retail-tracker.csv'; a.click();
            }}
            className="text-xs px-3 py-1.5 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-800 flex items-center gap-1"
          >
            ⬇ Export CSV
          </button>
          <button onClick={()=>setShowAdd(true)} className="text-xs px-3 py-1.5 rounded-lg bg-blue-600 hover:bg-blue-700 font-semibold flex items-center gap-1">
            + Add Item
          </button>
        </div>
      </header>

      {/* ── Brand Tabs + View Toggle ── */}
      <div className="bg-white border-b px-4 flex items-center gap-1 overflow-x-auto shrink-0" style={{minHeight:'44px'}}>
        {['All',...BRANDS].map(b => (
          <button
            key={b}
            onClick={()=>{setActiveBrand(b);setPage(1);}}
            className={`brand-tab ${activeBrand===b?'active':''}`}
          >
            {b} {b!=='All' && brandCounts[b] ? <span className="ml-1 opacity-70 text-xs">({brandCounts[b]})</span> : b==='All' ? <span className="ml-1 opacity-70 text-xs">({items.length})</span> : ''}
          </button>
        ))}
        {/* View mode toggle — pinned to right */}
        <div className="ml-auto pl-4 flex items-center gap-1 shrink-0">
          <button
            onClick={()=>setViewMode('matrix')}
            title="Brand × Retailer Matrix"
            className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg font-medium border transition-all ${viewMode==='matrix' ? 'bg-slate-800 text-white border-slate-800' : 'text-slate-500 border-slate-200 hover:border-slate-400'}`}
          >
            ⊞ Matrix
          </button>
          <button
            onClick={()=>setViewMode('table')}
            title="Detailed Table"
            className={`flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg font-medium border transition-all ${viewMode==='table' ? 'bg-slate-800 text-white border-slate-800' : 'text-slate-500 border-slate-200 hover:border-slate-400'}`}
          >
            ≡ Table
          </button>
        </div>
      </div>

      {/* ── Stats + Filters Bar ── */}
      <div className="bg-white border-b px-5 py-2.5 flex items-center gap-4 shrink-0 flex-wrap">
        {/* Stats chips */}
        <div className="flex items-center gap-3 text-xs">
          <span className="font-semibold text-slate-700">{filtered.length} items</span>
          <span className="flex items-center gap-1 text-green-700 font-medium">
            <span className="status-dot-live"></span>
            {filtered.filter(i=>i.status==='live').length} Live
          </span>
          <span className="flex items-center gap-1 text-amber-700 font-medium">
            <span className="status-dot-pending"></span>
            {filtered.filter(i=>i.status==='pending').length} Pending
          </span>
          {filtered.filter(i=>i.status==='in-progress').length > 0 &&
            <span className="flex items-center gap-1 text-blue-700 font-medium">
              <span className="status-dot-in-progress"></span>
              {filtered.filter(i=>i.status==='in-progress').length} In Progress
            </span>
          }
        </div>

        <div className="flex items-center gap-2 ml-auto flex-wrap">
          {/* Status filter pills */}
          {['All','pending','live','in-progress','hold'].map(s => (
            <button
              key={s}
              onClick={()=>{setFilterStatus(s);setPage(1);}}
              className={`text-xs px-3 py-1 rounded-full border font-medium transition-all ${
                filterStatus===s ? 'bg-slate-800 text-white border-slate-800' : 'text-slate-600 border-slate-200 hover:border-slate-400'
              }`}
            >
              {s==='All'?'All Status':statusObj(s).label}
            </button>
          ))}
          <div className="w-px h-4 bg-slate-200 mx-1"></div>
          {/* Retailer filter */}
          <select
            value={filterRetailer}
            onChange={e=>{setFilterRetailer(e.target.value);setPage(1);}}
            className="text-xs border border-slate-200 rounded-lg px-2.5 py-1 text-slate-600 focus:outline-none focus:border-blue-400"
          >
            <option value="All">All Retailers</option>
            {RETAILERS.map(r=><option key={r} value={r}>{r}</option>)}
          </select>
          <div className="w-px h-4 bg-slate-200 mx-1"></div>
          {/* SKU filter */}
          <div className="relative flex items-center">
            <input
              value={skuSearch}
              onChange={e=>{setSkuSearch(e.target.value);setPage(1);}}
              placeholder="Filter by SKU..."
              className="text-xs border border-slate-200 rounded-lg pl-2.5 pr-7 py-1 text-slate-600 focus:outline-none focus:border-blue-400 w-36"
            />
            {skuSearch && (
              <button onClick={()=>{setSkuSearch('');setPage(1);}} className="absolute right-2 text-slate-400 hover:text-slate-600 text-sm leading-none">&times;</button>
            )}
          </div>
        </div>
      </div>

      {/* ── Matrix or Table ── */}
      {viewMode === 'matrix' ? (
        <MatrixView items={items} onDrillDown={handleDrillDown} />
      ) : (
        <>
          {/* ── Table ── */}
          <div className="flex-1 overflow-auto table-container px-0">
            <table className="w-full border-collapse text-sm" style={{minWidth:'680px'}}>
              <thead className="sticky top-0 z-10">
                <tr className="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-500 uppercase tracking-wide">
                  <th className="w-28 px-4 py-2.5 text-left th-sort" onClick={()=>handleSort('status')}>
                    Status <SortArrow k="status"/>
                  </th>
                  <th className="w-28 px-3 py-2.5 text-left th-sort" onClick={()=>handleSort('sku')}>
                    SKU <SortArrow k="sku"/>
                  </th>
                  <th className="px-3 py-2.5 text-left th-sort" onClick={()=>handleSort('itemName')}>
                    Product Name <SortArrow k="itemName"/>
                  </th>
                  <th className="w-36 px-3 py-2.5 text-left th-sort" onClick={()=>handleSort('retailer')}>
                    Retailer <SortArrow k="retailer"/>
                  </th>
                  <th className="w-32 px-3 py-2.5 text-left">Brand</th>
                  <th className="w-16 px-3 py-2.5 text-center">URL</th>
                  <th className="w-20 px-3 py-2.5 text-center">Price</th>
                  <th className="w-16 px-3 py-2.5"></th>
                </tr>
              </thead>
              <tbody className="bg-white divide-y divide-slate-100">
                {paginated.length === 0 && (
                  <tr><td colSpan={7} className="text-center py-16 text-slate-400 text-sm">No items match your filters.</td></tr>
                )}
                {paginated.map(item => (
                  <TaskRow key={item.id} item={item} onEdit={setEditItem} onStatusChange={updateStatus} onSkuClick={setSelectedSku} />
                ))}
              </tbody>
            </table>
          </div>

          {/* ── Pagination ── */}
          {totalPages > 1 && (
            <div className="bg-white border-t px-5 py-2.5 flex items-center justify-between text-xs text-slate-500 shrink-0">
              <span>Showing {(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE,filtered.length)} of {filtered.length}</span>
              <div className="flex items-center gap-1">
                <button onClick={()=>setPage(1)} disabled={page===1} className="px-2 py-1 rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50">«</button>
                <button onClick={()=>setPage(p=>p-1)} disabled={page===1} className="px-2 py-1 rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50">‹</button>
                {Array.from({length:Math.min(7,totalPages)},(_,i)=>{
                  let p; if(totalPages<=7) p=i+1; else if(page<=4) p=i+1; else if(page>=totalPages-3) p=totalPages-6+i; else p=page-3+i;
                  return <button key={p} onClick={()=>setPage(p)} className={`px-2.5 py-1 rounded border ${page===p?'bg-blue-600 text-white border-blue-600':'border-slate-200 hover:bg-slate-50'}`}>{p}</button>;
                })}
                <button onClick={()=>setPage(p=>p+1)} disabled={page===totalPages} className="px-2 py-1 rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50">›</button>
                <button onClick={()=>setPage(totalPages)} disabled={page===totalPages} className="px-2 py-1 rounded border border-slate-200 disabled:opacity-30 hover:bg-slate-50">»</button>
              </div>
            </div>
          )}
        </>
      )}

      {/* ── Modals ── */}
      {selectedSku && !editItem && (
        <SkuPanel
          sku={selectedSku}
          items={items}
          onClose={()=>setSelectedSku(null)}
          onEditItem={(item)=>{ setSelectedSku(null); setEditItem(item); }}
        />
      )}
      {editItem && (
        <EditPanel item={editItem} onClose={()=>setEditItem(null)} onSave={updateItem} onDelete={deleteItem} />
      )}
      {showAdd && <AddModal onClose={()=>setShowAdd(false)} onAdd={addItem} />}
    </div>
  );
}

// ─── Task Row (separate component for perf) ───────────────────────────────────

  const s = statusObj(item.status);
  const brand = getBrand(item);

    <tr
      className="task-row cursor-pointer fade-in"
      onClick={() => onEdit(item)}
    >
      <td className="px-4 py-2">
        <StatusPill value={item.status} onChange={v=>onStatusChange(item.id,v)} />
      </td>
      <td className="px-3 py-2">
        <button
          onClick={e=>{e.stopPropagation(); onSkuClick(item.sku);}}
          className="font-mono text-xs bg-blue-50 text-blue-700 border border-blue-200 px-1.5 py-0.5 rounded hover:bg-blue-100 hover:border-blue-400 transition-colors cursor-pointer"
          title="Click to see all retailers for this SKU"
        >{item.sku || '—'}</button>
      </td>
      <td className="px-3 py-2 max-w-0">
        <div className="truncate text-slate-800 text-sm font-medium" title={item.itemName}>{item.itemName}</div>
      </td>
      <td className="px-3 py-2">
        <span className="text-xs text-slate-600 bg-slate-100 px-2 py-0.5 rounded-full">{item.retailer || '—'}</span>
      </td>
      <td className="px-3 py-2">
        <span className="text-xs text-slate-500">{brand || '—'}</span>
      </td>
      <td className="px-3 py-2 text-center">
        {item.websiteUrl
          ? <a href={item.websiteUrl} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()} className="text-blue-500 hover:text-blue-700 text-base" title={item.websiteUrl}>🔗</a>
          : <span className="text-slate-300 text-xs">—</span>
        }
      </td>
      <td className="px-3 py-2 text-center">
        {item.retailPrice
          ? <span className="text-xs font-semibold text-slate-700">{item.retailPrice}</span>
          : <span className="text-slate-300 text-xs">—</span>
        }
      </td>
      <td className="px-3 py-2">
        <div className="row-actions flex items-center gap-1 justify-end">
          <button
            onClick={e=>{e.stopPropagation();onEdit(item);}}
            className="text-xs px-2 py-0.5 rounded border border-slate-200 text-slate-500 hover:bg-slate-100"
          >Edit</button>
        </div>
      </td>
    </tr>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
